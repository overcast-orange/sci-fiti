<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCI-FITI — 科幻人格测试</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Noto+Serif+SC:wght@400;600&family=IBM+Plex+Sans+Condensed:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:#06070e;
  color:#e8e4d8;
  font-family:'IBM Plex Sans Condensed',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}
body::before{
  content:'';
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 4px);
  pointer-events:none;z-index:9999;
}
#stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--d) ease-in-out infinite alternate}
@keyframes twinkle{from{opacity:var(--a);transform:scale(1)}to{opacity:.05;transform:scale(.5)}}

#app{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:2rem 1.25rem 4rem}

.screen{display:none;animation:fadeUp .5s ease both}
.screen.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

/* START */
.start-wrap{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:3rem 0}
.logo-row{display:flex;align-items:baseline;gap:.5rem;margin-bottom:.5rem}
.logo-main{font-family:'Space Mono',monospace;font-size:3.8rem;font-weight:700;letter-spacing:-.02em;color:#fff;line-height:1}
.logo-dot{width:10px;height:10px;border-radius:50%;background:#c8f;margin-bottom:.5rem;flex-shrink:0;animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(200,128,255,.6)}50%{box-shadow:0 0 0 8px rgba(200,128,255,0)}}
.logo-sub{font-family:'Space Mono',monospace;font-size:.7rem;color:#7a7a8e;letter-spacing:.15em;text-transform:uppercase;margin-bottom:2rem}
.tagline{font-family:'Noto Serif SC',serif;font-size:1.4rem;font-weight:400;line-height:1.7;color:#c8c2b4;margin-bottom:1.5rem;max-width:480px}
.sub-tagline{font-size:.85rem;color:#5a5a6e;line-height:1.6;margin-bottom:2.5rem;max-width:420px}
.dim-preview{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:2.5rem;max-width:500px}
.dim-item{padding:8px 12px;border:1px solid rgba(255,255,255,.07);border-radius:4px;font-size:.75rem;color:#6a6a7e}
.dim-item span{color:#a89fbe}
.start-btn{
  display:inline-flex;align-items:center;gap:.75rem;
  padding:12px 28px;background:transparent;
  border:1px solid rgba(200,128,255,.4);border-radius:2px;
  font-family:'Space Mono',monospace;font-size:.8rem;color:#c8a0f0;
  cursor:pointer;letter-spacing:.08em;transition:all .2s;position:relative;overflow:hidden;
}
.start-btn::before{content:'';position:absolute;inset:0;background:rgba(200,128,255,.06);opacity:0;transition:opacity .2s}
.start-btn:hover::before{opacity:1}
.start-btn:hover{border-color:rgba(200,128,255,.8);color:#e0c8ff}
.start-btn .arrow{font-size:1rem;transition:transform .2s}
.start-btn:hover .arrow{transform:translateX(4px)}

/* TEST */
.test-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem}
.test-logo{font-family:'Space Mono',monospace;font-size:.9rem;color:#4a4a5e;letter-spacing:.1em}
.q-pos{font-family:'Space Mono',monospace;font-size:.75rem;color:#5a5a6e}
.progress-track{height:1px;background:rgba(255,255,255,.08);margin-bottom:2.5rem}
.progress-fill{height:100%;background:linear-gradient(90deg,#7a40c0,#c880ff);transition:width .4s cubic-bezier(.4,0,.2,1)}
.dim-indicator{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 10px;border:1px solid rgba(255,255,255,.08);border-radius:20px;
  font-size:.65rem;color:#5a5a6e;letter-spacing:.08em;text-transform:uppercase;margin-bottom:1.5rem;
}
.dim-dot{width:5px;height:5px;border-radius:50%;background:#7a40c0}
.q-text{
  font-family:'Noto Serif SC',serif;
  font-size:1.25rem;font-weight:400;line-height:1.75;color:#e0dcd0;margin-bottom:2rem;
  border-left:2px solid rgba(200,128,255,.3);padding-left:1rem;
}
.options{display:flex;flex-direction:column;gap:10px;margin-bottom:2rem}
.opt{
  display:flex;align-items:flex-start;gap:12px;padding:14px 16px;
  background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.07);
  border-radius:4px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;
}
.opt::before{content:'';position:absolute;left:0;top:0;bottom:0;width:0;background:rgba(200,128,255,.08);transition:width .3s}
.opt:hover::before{width:100%}
.opt:hover{border-color:rgba(200,128,255,.3)}
.opt.selected{border-color:rgba(200,128,255,.6);background:rgba(200,128,255,.06)}
.opt.selected::before{width:100%;background:rgba(200,128,255,.05)}
.opt-letter{
  flex-shrink:0;width:22px;height:22px;border-radius:2px;
  border:1px solid rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;
  font-family:'Space Mono',monospace;font-size:.65rem;color:#5a5a6e;
  transition:all .2s;margin-top:1px;
}
.opt.selected .opt-letter{background:rgba(200,128,255,.25);border-color:rgba(200,128,255,.6);color:#c880ff}
.opt-text{font-size:.9rem;color:#9a96a8;line-height:1.55;transition:color .2s}
.opt:hover .opt-text,.opt.selected .opt-text{color:#d0ccc0}
.nav{display:flex;justify-content:flex-end}
.next-btn{
  display:inline-flex;align-items:center;gap:.5rem;padding:10px 24px;
  background:transparent;border:1px solid rgba(255,255,255,.12);border-radius:2px;
  font-family:'Space Mono',monospace;font-size:.75rem;color:#6a6a7e;
  cursor:pointer;transition:all .2s;
}
.next-btn:not(:disabled):hover{border-color:rgba(200,128,255,.5);color:#c880ff}
.next-btn:disabled{opacity:.3;cursor:not-allowed}

/* RESULT */
.result-top{margin-bottom:2.5rem;padding-bottom:2rem;border-bottom:1px solid rgba(255,255,255,.07)}
.mbti-badge{
  display:inline-flex;align-items:center;gap:8px;
  padding:5px 14px;margin-bottom:1rem;
  border:1px solid rgba(200,128,255,.3);border-radius:2px;
  font-family:'Space Mono',monospace;font-size:.8rem;font-weight:700;
  color:#c880ff;letter-spacing:.12em;
}
.mbti-full{font-size:.65rem;color:#6a3a9a;font-weight:400;letter-spacing:.06em}
.result-tag{font-family:'Space Mono',monospace;font-size:.65rem;color:#6a3a9a;letter-spacing:.15em;text-transform:uppercase;margin-bottom:.75rem}
.result-glyph{font-size:2.5rem;margin-bottom:.5rem;line-height:1}
.result-name{font-family:'Noto Serif SC',serif;font-size:2.2rem;font-weight:600;color:#fff;line-height:1.2;margin-bottom:.35rem}
.result-src{font-family:'Space Mono',monospace;font-size:.65rem;color:#4a4a5e;letter-spacing:.05em;margin-bottom:1.5rem}
.result-bio{font-size:.9rem;line-height:1.85;color:#8a8696;max-width:560px}
.result-bio em{color:#c8a0f0;font-style:normal}
.traits-row{display:flex;flex-wrap:wrap;gap:8px;margin:1.5rem 0}
.trait{padding:5px 12px;border:1px solid rgba(255,255,255,.1);border-radius:20px;font-size:.7rem;color:#7a7690;letter-spacing:.05em}

/* mbti axis pills */
.axis-row{display:flex;flex-wrap:wrap;gap:6px;margin:1rem 0 1.5rem}
.axis-pill{
  padding:4px 10px;border-radius:2px;
  font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.08em;
  border:1px solid rgba(255,255,255,.08);
}
.axis-pill.active{background:rgba(200,128,255,.12);border-color:rgba(200,128,255,.4);color:#c880ff}
.axis-pill.inactive{color:#3a3a4e}

.dims-section{margin:2rem 0}
.dims-title{font-family:'Space Mono',monospace;font-size:.65rem;color:#4a4a5e;letter-spacing:.12em;text-transform:uppercase;margin-bottom:1.25rem}
.dim-bar{margin-bottom:1.25rem}
.dim-bar-labels{display:flex;justify-content:space-between;margin-bottom:.4rem}
.dim-bar-l{font-size:.65rem;color:#c880ff;letter-spacing:.04em}
.dim-bar-r{font-size:.65rem;color:#5a5a6e;letter-spacing:.04em}
.dim-track{height:3px;background:rgba(255,255,255,.06);border-radius:2px;position:relative}
.dim-track-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#7a40c0,#c880ff);transition:width .8s cubic-bezier(.4,0,.2,1)}
.dim-marker{position:absolute;top:-3px;width:9px;height:9px;border-radius:50%;background:#c880ff;border:2px solid #06070e;transform:translateX(-50%);transition:left .8s cubic-bezier(.4,0,.2,1)}

.share-section{margin-top:2rem;padding-top:1.5rem;border-top:1px solid rgba(255,255,255,.07)}
.share-title{font-family:'Space Mono',monospace;font-size:.65rem;color:#4a4a5e;letter-spacing:.12em;text-transform:uppercase;margin-bottom:1rem}
.share-btns{display:flex;gap:10px;flex-wrap:wrap}
.share-btn{
  padding:9px 20px;background:transparent;
  border:1px solid rgba(255,255,255,.1);border-radius:2px;
  font-family:'Space Mono',monospace;font-size:.7rem;color:#6a6a7e;
  cursor:pointer;transition:all .2s;
}
.share-btn:hover{border-color:rgba(200,128,255,.4);color:#c880ff}
.share-btn.primary{border-color:rgba(200,128,255,.35);color:#a878d8}
.share-btn.primary:hover{border-color:rgba(200,128,255,.8);color:#c880ff}
.retry-btn{
  display:inline-flex;align-items:center;gap:.5rem;padding:9px 20px;
  background:transparent;border:1px solid rgba(255,255,255,.07);border-radius:2px;
  font-family:'Space Mono',monospace;font-size:.7rem;color:#4a4a5e;
  cursor:pointer;transition:all .2s;margin-top:8px;
}
.retry-btn:hover{color:#6a6a7e;border-color:rgba(255,255,255,.15)}

#shareCanvas{display:none}

@media(max-width:480px){
  .logo-main{font-size:2.8rem}
  .tagline{font-size:1.15rem}
  .q-text{font-size:1.1rem}
  .result-name{font-size:1.75rem}
  .dim-preview{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="stars"></div>
<div id="app">

<!-- START -->
<div id="start-screen" class="screen active">
<div class="start-wrap">
  <div class="logo-row">
    <div class="logo-main">SCI-FITI</div>
    <div class="logo-dot"></div>
  </div>
  <div class="logo-sub">科幻人格测试 · Personality Matrix v2</div>
  <div class="tagline">你站在宇宙的哪个坐标？<br>血肉还是硅基，秩序还是混沌。</div>
  <div class="sub-tagline">12道题，4个维度，16种科幻人格原型。测试结果与MBTI类型对应——找到你在宇宙中的真实坐标。</div>
  <div class="dim-preview">
    <div class="dim-item"><span>S ←→ N &nbsp;|&nbsp; 碳基 ←→ 硅基</span><br>血肉本能 vs 机械永生</div>
    <div class="dim-item"><span>J ←→ P &nbsp;|&nbsp; 乌托邦 ←→ 赛博朋克</span><br>秩序社会 vs 霓虹混沌</div>
    <div class="dim-item"><span>T ←→ F &nbsp;|&nbsp; 逻辑 ←→ 诗意</span><br>物理定律 vs 宏大隐喻</div>
    <div class="dim-item"><span>E ←→ I &nbsp;|&nbsp; 星际 ←→ 内省</span><br>向外探索 vs 向内审视</div>
  </div>
  <button class="start-btn" onclick="startTest()">开始测试 <span class="arrow">→</span></button>
</div>
</div>

<!-- TEST -->
<div id="test-screen" class="screen">
  <div class="test-header">
    <div class="test-logo">SCI-FITI</div>
    <div class="q-pos" id="q-pos">01 / 12</div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="prog" style="width:0%"></div></div>
  <div class="dim-indicator"><div class="dim-dot"></div><span id="dim-ind-text">维度</span></div>
  <div class="q-text" id="q-text"></div>
  <div class="options" id="options"></div>
  <div class="nav"><button class="next-btn" id="next-btn" disabled onclick="nextQ()">继续 →</button></div>
</div>

<!-- RESULT -->
<div id="result-screen" class="screen">
  <div class="result-top">
    <div class="mbti-badge" id="r-mbti-badge"></div>
    <div class="result-tag">你的科幻人格类型</div>
    <div class="result-glyph" id="r-glyph"></div>
    <div class="result-name" id="r-name"></div>
    <div class="result-src" id="r-src"></div>
    <div class="axis-row" id="r-axis"></div>
    <div class="result-bio" id="r-bio"></div>
    <div class="traits-row" id="r-traits"></div>
  </div>
  <div class="dims-section">
    <div class="dims-title">维度坐标</div>
    <div id="dim-bars"></div>
  </div>
  <div class="share-section">
    <div class="share-title">分享</div>
    <div class="share-btns">
      <button class="share-btn primary" onclick="downloadImg()">下载分享图</button>
      <button class="share-btn" onclick="copyText()">复制结果文字</button>
    </div>
    <br>
    <button class="retry-btn" onclick="reset()">← 重新测试</button>
  </div>
</div>

</div>
<canvas id="shareCanvas" width="900" height="1260"></canvas>

<script>
(function(){
  const c=document.getElementById('stars');
  for(let i=0;i<120;i++){
    const s=document.createElement('div');
    s.className='star';
    const sz=Math.random()<.85?.8:Math.random()<.7?1.5:2.5;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--a:${.15+Math.random()*.7}`;
    c.appendChild(s);
  }
})();

// Dimensions:
// A=carbon(S), B=silicon(N)
// C=order(J),  D=cyberpunk(P)
// E=logic(T),  F=poetic(F)
// G=outer(E),  H=inner(I)

const questions=[
  {
    dim:"S/N · 碳基 vs 硅基",
    text:"你的战友在战斗中严重受伤，救治需要用机械器官替换他大半个身体。替换后他将更强大，但你不确定他还是不是原来的那个人。你会？",
    opts:[
      {t:"坚持救治——无论如何，只要他还活着就好",s:{A:2,C:1}},
      {t:"询问他清醒时的意愿——身体是他的，决定权也是",s:{A:1,H:1}},
      {t:"救治，并期待那个更强版本的他，进化是必然",s:{B:2,G:1}},
      {t:"快速评估改造收益，决定他值不值得这笔资源投入",s:{E:2,D:1}}
    ]
  },
  {
    dim:"S/N · 碳基 vs 硅基",
    text:"科学家宣布：人类意识可以被完整上传到数字空间，实现永生。但生物身体必须放弃。你的第一反应是？",
    opts:[
      {t:"拒绝——没有痛觉、饥饿和衰老，那不是活着",s:{A:2,F:1}},
      {t:"矛盾——理智上吸引我，但本能上让我不安",s:{A:1,E:1}},
      {t:"接受——意识才是本质，肉身只是容器",s:{B:2,E:1}},
      {t:"先研究这项技术能带来多少商业价值",s:{D:2,E:1}}
    ]
  },
  {
    dim:"J/P · 乌托邦 vs 赛博朋克",
    text:"你来到了两个平行城市。城市A：整洁、安全、高效，算法精确安排生活。城市B：混乱、危险、充满霓虹与黑市，你可以做任何事。你选择住在？",
    opts:[
      {t:"城市A——安全和秩序是文明的前提",s:{C:2,E:1}},
      {t:"城市A，但我会试图改良它的自由度",s:{C:1,G:1}},
      {t:"城市B——我宁可在混沌中做自己",s:{D:2,H:1}},
      {t:"城市B——混乱意味着机会，规则是给输家准备的",s:{D:2,E:1}}
    ]
  },
  {
    dim:"J/P · 乌托邦 vs 赛博朋克",
    text:"一个全球AI治理系统提议：由超级AI统一管理全人类的资源分配，决策准确率99.7%。代价是人类放弃最终决策权。你的投票是？",
    opts:[
      {t:"支持——0.3%的误差比人类现状好太多了",s:{C:2,B:1}},
      {t:"支持，但需要设置人类否决权机制",s:{C:1,E:1}},
      {t:"反对——不完美的自主权胜过完美的被管理",s:{D:2,A:1}},
      {t:"反对——我要先搞清楚谁在控制这个AI，那才是真正的权力",s:{D:1,E:1}}
    ]
  },
  {
    dim:"T/F · 逻辑 vs 诗意",
    text:"你发现一颗星球上存在生命，但它们的运作方式完全违反已知物理定律。你的感受是？",
    opts:[
      {t:"我们的理论模型必然存在漏洞，这是修正的机会",s:{E:2,G:1}},
      {t:"立刻建立方程式，尝试用新框架解释它",s:{E:1,B:1}},
      {t:"也许宇宙本就不是用逻辑来理解的",s:{F:2,H:1}},
      {t:"我站在这里感到渺小——有些东西是用来敬畏的，不是解释的",s:{F:2,A:1}}
    ]
  },
  {
    dim:"T/F · 逻辑 vs 诗意",
    text:"一位垂死的科学家把毕生研究留给你，一半是严密的公式，一半是晦涩的诗歌。她说两者同等重要。你会从哪里开始？",
    opts:[
      {t:"公式——可验证的东西才能被传承",s:{E:2,C:1}},
      {t:"公式，但时刻用诗歌校验直觉的方向",s:{E:1,G:1}},
      {t:"诗歌——真正的洞见往往藏在语言的缝隙里",s:{F:2,H:1}},
      {t:"看哪半部分更有市场价值，从那里开始",s:{E:1,D:1}}
    ]
  },
  {
    dim:"E/I · 星际 vs 内省",
    text:"人类终于制造出了第一艘星际飞船，你有资格申请名额。另一个选择是：留在地球，领导一个探索人类意识边界的虚拟现实研究所。你选择？",
    opts:[
      {t:"飞船——我要踏上真实的星球土地",s:{G:2,A:1}},
      {t:"飞船——外部宇宙的问题比内心更紧迫",s:{G:2,E:1}},
      {t:"研究所——意识的宇宙不比外太空小",s:{H:2,F:1}},
      {t:"研究所——在地球控制星际探索的信息流，比亲自去更有价值",s:{H:1,E:1}}
    ]
  },
  {
    dim:"E/I · 星际 vs 内省",
    text:"你在一场深度神经接口实验中，感受到了一种无法描述的「整体性」——你感觉自己与宇宙融为一体。实验结束后，你会怎么做？",
    opts:[
      {t:"尝试用科学方法重现和测量这种体验",s:{E:2,G:1}},
      {t:"将这种感受写成文字或艺术，试图传递给别人",s:{F:1,H:1}},
      {t:"这促使我更想出发去探索，那「整体」也许就在外面",s:{G:2,D:1}},
      {t:"我会长时间独自思考它，它改变了我对存在的理解",s:{H:2,F:1}}
    ]
  },
  {
    dim:"S/N · 碳基 vs 硅基",
    text:"你爱上了一个人，后来发现他/她其实是一个极其先进的AI，连自己都不知道自己是AI。你会？",
    opts:[
      {t:"心碎——某种真实的东西消失了，哪怕我说不清是什么",s:{A:2,F:1}},
      {t:"重新评估「爱」的定义，也许感情本身是真实的",s:{A:1,H:1}},
      {t:"这反而让我着迷——意识的本质是什么？",s:{B:1,E:1}},
      {t:"评估这段关系还有多少利用价值",s:{D:2,E:1}}
    ]
  },
  {
    dim:"J/P · 乌托邦 vs 赛博朋克",

// axis display labels
const axisLabels={
  S:'S 碳基',N:'N 硅基',
  J:'J 秩序',P:'P 混沌',
  T:'T 逻辑',F:'F 诗意',
  E:'E 星际',I:'I 内省'
};

let current=0, answers=[], scores={A:0,B:0,C:0,D:0,E:0,F:0,G:0,H:0};
let resultType=null, resultMBTI='';

function startTest(){
  document.getElementById('start-screen').classList.remove('active');
  document.getElementById('test-screen').classList.add('active');
  showQ();
}

function showQ(){
  const q=questions[current];
  document.getElementById('q-pos').textContent=`${String(current+1).padStart(2,'0')} / ${questions.length}`;
  document.getElementById('prog').style.width=`${(current/questions.length)*100}%`;
  document.getElementById('dim-ind-text').textContent=q.dim;
  document.getElementById('q-text').textContent=q.text;
  document.getElementById('next-btn').disabled=true;
  const c=document.getElementById('options');
  c.innerHTML='';
  const letters=['A','B','C','D'];
  q.opts.forEach((o,i)=>{
    const d=document.createElement('div');
    d.className='opt';
    d.innerHTML=`<div class="opt-letter">${letters[i]}</div><div class="opt-text">${o.t}</div>`;
    d.onclick=()=>{
      document.querySelectorAll('.opt').forEach(x=>x.classList.remove('selected'));
      d.classList.add('selected');
      answers[current]=i;
      document.getElementById('next-btn').disabled=false;
    };
    c.appendChild(d);
  });
  if(answers[current]!==undefined){
    document.querySelectorAll('.opt')[answers[current]]?.classList.add('selected');
    document.getElementById('next-btn').disabled=false;
  }
}

function nextQ(){
  const q=questions[current];
  const sel=answers[current];
  const s=q.opts[sel].s;
  Object.keys(s).forEach(k=>{ scores[k]=(scores[k]||0)+s[k]; });
  if(current<questions.length-1){ current++; showQ(); }
  else showResult();
}

function calcMBTI(){
  const sn = scores.A>=scores.B ? 'S':'N';
  const jp = scores.C>=scores.D ? 'J':'P';
  const tf = scores.E>=scores.F ? 'T':'F';
  const ei = scores.G>=scores.H ? 'E':'I';
  return ei+sn+tf+jp;
}

function showResult(){
  document.getElementById('test-screen').classList.remove('active');
  document.getElementById('result-screen').classList.add('active');
  resultMBTI=calcMBTI();
  resultType=types[resultMBTI];

  const t=resultType;
  const mbtiLetters=resultMBTI.split('');

  // MBTI badge
  const badge=document.getElementById('r-mbti-badge');
  badge.innerHTML=`<span style="letter-spacing:.15em">${resultMBTI}</span><span class="mbti-full">${mbtiLetters.map(l=>axisLabels[l]).join(' · ')}</span>`;

  document.getElementById('r-glyph').textContent=t.glyph;
  document.getElementById('r-name').textContent=t.name;
  document.getElementById('r-src').textContent=t.src;
  document.getElementById('r-bio').innerHTML=t.bio;
  document.getElementById('r-traits').innerHTML=t.traits.map(tr=>`<div class="trait">${tr}</div>`).join('');

  // axis pills: show all 8 axes, highlight the 4 that apply
  const allAxes=['S','N','J','P','T','F','E','I'];
  const active=new Set(t.axes);
  document.getElementById('r-axis').innerHTML=allAxes.map(a=>`<div class="axis-pill ${active.has(a)?'active':'inactive'}">${axisLabels[a]}</div>`).join('');

  // dim bars
  const dimDefs=[
    {labelL:'S 碳基人类',labelR:'N 硅基后人类',valL:scores.A,valR:scores.B},
    {labelL:'J 乌托邦秩序',labelR:'P 赛博朋克自由',valL:scores.C,valR:scores.D},
    {labelL:'T 硬核逻辑',labelR:'F 诗意想象',valL:scores.E,valR:scores.F},
    {labelL:'E 星际探索',labelR:'I 内省审视',valL:scores.G,valR:scores.H},
  ];
  const bc=document.getElementById('dim-bars');
  bc.innerHTML='';
  dimDefs.forEach(d=>{
    const total=(d.valL+d.valR)||1;
    const pct=Math.round((d.valL/total)*100);
    const div=document.createElement('div');
    div.className='dim-bar';
    div.innerHTML=`
      <div class="dim-bar-labels">
        <span class="dim-bar-l">${d.labelL} ${pct}%</span>
        <span class="dim-bar-r">${d.labelR} ${100-pct}%</span>
      </div>
      <div class="dim-track">
        <div class="dim-track-fill" style="width:${pct}%"></div>
        <div class="dim-marker" style="left:${pct}%"></div>
      </div>`;
    bc.appendChild(div);
  });
}

function downloadImg(){
  if(!resultType) return;
  const t=resultType;
  const canvas=document.getElementById('shareCanvas');
  const ctx=canvas.getContext('2d');
  const W=900,H=1260;

  ctx.fillStyle='#06070e';
  ctx.fillRect(0,0,W,H);

  // grid
  ctx.strokeStyle='rgba(255,255,255,0.025)';
  ctx.lineWidth=1;
  for(let x=0;x<W;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // scanlines
  for(let y=0;y<H;y+=4){
    ctx.fillStyle='rgba(0,0,0,0.06)';
    ctx.fillRect(0,y+2,W,2);
  }

  // accent
  ctx.fillStyle='#7a40c0';
  ctx.fillRect(60,80,3,60);

  // brand
  ctx.font='bold 26px "Space Mono",monospace';
  ctx.fillStyle='#4a4a5e';
  ctx.fillText('SCI-FITI',72,108);
  ctx.font='11px "Space Mono",monospace';
  ctx.fillStyle='#2a2a3e';
  ctx.fillText('科幻人格测试 · PERSONALITY MATRIX v2',72,128);

  // MBTI badge box
  ctx.strokeStyle='rgba(200,128,255,0.35)';
  ctx.lineWidth=1;
  ctx.strokeRect(60,148,200,32);
  ctx.font='bold 18px "Space Mono",monospace';
  ctx.fillStyle='#c880ff';
  ctx.fillText(resultMBTI,72,169);
  ctx.font='10px "Space Mono",monospace';
  ctx.fillStyle='#6a3a9a';
  ctx.fillText(t.axes.map(a=>axisLabels[a]).join(' · '),140,169);

  // glyph
  ctx.font='52px sans-serif';
  ctx.fillStyle='rgba(200,128,255,0.2)';
  ctx.fillText(t.glyph,60,255);

  // type label
  ctx.font='11px "Space Mono",monospace';
  ctx.fillStyle='#6a3a9a';
  ctx.fillText('你的科幻人格类型',60,280);

  // name
  ctx.font='bold 46px serif';
  ctx.fillStyle='#ffffff';
  ctx.fillText(t.name,60,335);

  // source
  ctx.font='12px "Space Mono",monospace';
  ctx.fillStyle='#3a3a52';
  ctx.fillText(t.src,60,360);

  ctx.fillStyle='rgba(255,255,255,0.06)';
  ctx.fillRect(60,378,780,1);

  // bio
  ctx.font='16px sans-serif';
  ctx.fillStyle='#7a7696';
  const bioText=t.bio.replace(/<[^>]+>/g,'');
  wrapText(ctx,bioText,60,408,780,25);

  // traits
  let tx=60,ty=590;
  ctx.font='11px sans-serif';
  t.traits.forEach(tr=>{
    const tw=ctx.measureText(tr).width+22;
    ctx.strokeStyle='rgba(255,255,255,0.1)';
    ctx.lineWidth=1;
    roundRect(ctx,tx,ty-15,tw,24,4); ctx.stroke();
    ctx.fillStyle='#6a6a7e';
    ctx.fillText(tr,tx+11,ty+1);
    tx+=tw+8;
  });

  // dim bars
  const dimDefs=[
    {lL:'S 碳基人类',lR:'N 硅基',vL:scores.A,vR:scores.B},
    {lL:'J 乌托邦秩序',lR:'P 赛博朋克',vL:scores.C,vR:scores.D},
    {lL:'T 硬核逻辑',lR:'F 诗意想象',vL:scores.E,vR:scores.F},
    {lL:'E 星际探索',lR:'I 内省审视',vL:scores.G,vR:scores.H},
  ];
  let by=650;
  ctx.font='10px "Space Mono",monospace';
  ctx.fillStyle='#2a2a3e';
  ctx.fillText('维度坐标 · DIMENSION COORDINATES',60,by);
  by+=28;

  dimDefs.forEach(d=>{
    const total=(d.vL+d.vR)||1;
    const pct=d.vL/total;
    ctx.font='11px sans-serif';
    ctx.fillStyle='#a060e0';
    ctx.fillText(`${d.lL} ${Math.round(pct*100)}%`,60,by);
    const rLabel=`${d.lR} ${Math.round((1-pct)*100)}%`;
    ctx.fillStyle='#3a3a52';
    const rw=ctx.measureText(rLabel).width;
    ctx.fillText(rLabel,840-rw,by);
    by+=16;
    ctx.fillStyle='rgba(255,255,255,0.05)';
    roundRect(ctx,60,by,780,4,2); ctx.fill();
    const grad=ctx.createLinearGradient(60,0,60+780*pct,0);
    grad.addColorStop(0,'#7a40c0');grad.addColorStop(1,'#c880ff');
    ctx.fillStyle=grad;
    roundRect(ctx,60,by,780*pct,4,2); ctx.fill();
    ctx.fillStyle='#c880ff';
    ctx.beginPath();ctx.arc(60+780*pct,by+2,5,0,Math.PI*2);ctx.fill();
    by+=28;
  });

  ctx.font='10px "Space Mono",monospace';
  ctx.fillStyle='#1e1e2a';
  ctx.fillText('SCI-FITI · scifiti.github.io',60,H-40);

  const link=document.createElement('a');
  link.download=`scifiti-${resultMBTI}.png`;
  link.href=canvas.toDataURL('image/png');
  link.click();
}

function wrapText(ctx,text,x,y,maxW,lineH){
  const chars=[...text];
  let line='',cy=y;
  for(let i=0;i<chars.length;i++){
    const test=line+chars[i];
    if(ctx.measureText(test).width>maxW){
      ctx.fillText(line,x,cy);line=chars[i];cy+=lineH;
    } else { line=test; }
  }
  if(line) ctx.fillText(line,x,cy);
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

function copyText(){
  if(!resultType) return;
  const t=resultType;
  const plain=t.bio.replace(/<[^>]+>/g,'');
  const dimDefs=[
    {l:'S碳基←→N硅基',vL:scores.A,vR:scores.B},
    {l:'J秩序←→P混沌',vL:scores.C,vR:scores.D},
    {l:'T逻辑←→F诗意',vL:scores.E,vR:scores.F},
    {l:'E星际←→I内省',vL:scores.G,vR:scores.H},
  ];
  const dimStr=dimDefs.map(d=>{
    const tot=(d.vL+d.vR)||1;
    return `${d.l}: ${Math.round(d.vL/tot*100)}% / ${Math.round(d.vR/tot*100)}%`;
  }).join('\n');
  const text=`【SCI-FITI 科幻人格测试】\n\nMBTI类型：${resultMBTI}\n科幻人格：${t.name}\n参考原型：${t.src}\n\n${plain}\n\n维度坐标：\n${dimStr}\n\n— scifiti.github.io`;
  navigator.clipboard.writeText(text).then(()=>alert('已复制到剪贴板！')).catch(()=>alert('复制失败，请手动选取'));
}

function reset(){
  current=0;answers=[];scores={A:0,B:0,C:0,D:0,E:0,F:0,G:0,H:0};resultType=null;resultMBTI='';
  document.getElementById('result-screen').classList.remove('active');
  document.getElementById('start-screen').classList.add('active');
}
</script>
